# ============================================================================
# VS Code benchmark tasks
#
# Codebase Comprehension Tasks (50 questions requiring structural understanding)
# These tasks test whether llmcc helps with understanding
# cross-module relationships, data flow, and architectural patterns.
# ============================================================================

[[tasks]]
id = "vscode-qa-001"
repo = "vscode"
category = "exploration"
difficulty = "easy"
description = """
Find the main entry point for VS Code's desktop application.

Find:
1. The main electron entry file
2. How the window is created and initialized
3. The bootstrap sequence that loads VS Code

Report the file paths and key function names.

TASK COMPLETE when you identify the main entry point and bootstrap flow.
"""

