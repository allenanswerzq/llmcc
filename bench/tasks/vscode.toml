id = "vscode-qa-002"
repo = "vscode"
category = "exploration"
difficulty = "easy"
description = """
Find where VS Code defines its extension API types.

Find:
1. The main vscode.d.ts definition file location
2. Where proposed APIs are defined
3. How the API types are organized

Report the file paths and explain the API type structure.

TASK COMPLETE when you locate all API definition files.
"""

