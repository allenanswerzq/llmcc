# JavaScript token mappings for llmcc
# Architecture-first: classes, functions, methods, and calls.

default_hir_kind = "Internal"

[[nodes]]
ts_name = "program"
hir_kind = "Scope"
block_kind = "Root"

[[nodes]]
ts_name = "class_declaration"
hir_kind = "Scope"
block_kind = "Class"

[[nodes]]
ts_name = "function_declaration"
hir_kind = "Scope"
block_kind = "Func"

[[nodes]]
ts_name = "generator_function_declaration"
hir_kind = "Scope"
block_kind = "Func"

[[nodes]]
ts_name = "method_definition"
hir_kind = "Scope"
block_kind = "Func"

[[nodes]]
ts_name = "call_expression"
block_kind = "Call"

[[nodes]]
ts_name = "identifier"
hir_kind = "Identifier"

[[nodes]]
ts_name = "property_identifier"
hir_kind = "Identifier"

[[fields]]
name = "field_name"
field_name = "name"

[[fields]]
name = "field_function"
field_name = "function"

# JavaScript has no stable type field in this first architecture map pass.
[[fields]]
name = "field_type"
field_name = "name"

[[fields]]
name = "field_trait"
field_name = "name"
