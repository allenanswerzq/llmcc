# Go token mappings for llmcc
# Architecture-first: type specs, functions, methods, and calls.

default_hir_kind = "Internal"

[[nodes]]
ts_name = "source_file"
hir_kind = "Scope"
block_kind = "Root"

[[nodes]]
ts_name = "type_spec"
hir_kind = "Scope"
block_kind = "Class"

[[nodes]]
ts_name = "function_declaration"
hir_kind = "Scope"
block_kind = "Func"

[[nodes]]
ts_name = "method_declaration"
hir_kind = "Scope"
block_kind = "Func"

[[nodes]]
ts_name = "call_expression"
block_kind = "Call"

[[nodes]]
ts_name = "identifier"
hir_kind = "Identifier"

[[nodes]]
ts_name = "type_identifier"
hir_kind = "Identifier"

[[fields]]
name = "field_name"
field_name = "name"

[[fields]]
name = "field_function"
field_name = "function"

[[fields]]
name = "field_type"
field_name = "type"

[[fields]]
name = "field_trait"
field_name = "type"
