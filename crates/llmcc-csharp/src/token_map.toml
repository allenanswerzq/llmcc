# C# token mappings for llmcc
# Architecture-first: classes, structs, records, interfaces, enums, methods, and calls.

default_hir_kind = "Internal"

[[nodes]]
ts_name = "compilation_unit"
hir_kind = "Scope"
block_kind = "Root"

[[nodes]]
ts_name = "class_declaration"
hir_kind = "Scope"
block_kind = "Class"

[[nodes]]
ts_name = "struct_declaration"
hir_kind = "Scope"
block_kind = "Class"

[[nodes]]
ts_name = "record_declaration"
hir_kind = "Scope"
block_kind = "Class"

[[nodes]]
ts_name = "interface_declaration"
hir_kind = "Scope"
block_kind = "Interface"

[[nodes]]
ts_name = "enum_declaration"
hir_kind = "Scope"
block_kind = "Enum"

[[nodes]]
ts_name = "method_declaration"
hir_kind = "Scope"
block_kind = "Func"

[[nodes]]
ts_name = "constructor_declaration"
hir_kind = "Scope"
block_kind = "Func"

[[nodes]]
ts_name = "invocation_expression"
block_kind = "Call"

[[nodes]]
ts_name = "identifier"
hir_kind = "Identifier"

[[nodes]]
ts_name = "member_access_expression"

[[fields]]
name = "field_name"
field_name = "name"

[[fields]]
name = "field_function"
field_name = "function"

[[fields]]
name = "field_type"
field_name = "type"

[[fields]]
name = "field_trait"
field_name = "type"
